# ── Prefix ────────────────────────────────────────────
# Ctrl+B conservé — habituel et universel sur VPS
# Ctrl+A en alternative si tu préfères (décommenter)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ── Base ───────────────────────────────────────────────
set -g mouse on
setw -g mode-keys vi

# Copie tmux → presse-papier macOS
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
set -g set-clipboard on

set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0           # pas de délai après Escape (important pour vim)

# ── Splits (garde le répertoire courant) ───────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigation panes à la vim ──────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ──────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Reload config ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config rechargée ✓"

# ── Sessions : switching rapide ────────────────────────
bind s choose-tree -Zs         # vue arbre de toutes les sessions

# ── Statusbar ──────────────────────────────────────────
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour234,fg=colour250"

# Gauche : nom de session
set -g status-left "#[fg=colour81,bold] #S #[fg=colour238]│ "
set -g status-left-length 30

# Droite : dossier courant | heure
set -g status-right "#[fg=colour238]│ #[fg=colour250]#{pane_current_path} #[fg=colour238]│ #[fg=colour81]%H:%M "
set -g status-right-length 80

# Windows
setw -g window-status-current-style "fg=colour81,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
setw -g window-status-separator ""

# ── Plugins ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-strategy-vim 'session'

run '~/.tmux/plugins/tpm/tpm'
